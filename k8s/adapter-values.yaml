prometheus:
  url: http://monitoring-stack-kube-prom-prometheus.monitoring.svc
  port: 9090

rules:
  default: false
  custom:
    - seriesQuery: '{__name__="work_active_requests",namespace!="",pod!=""}'
      resources:
        overrides:
          namespace:
            resource: "namespace"
          pod:
            resource: "pod"
      name:
        as: "work_active_requests_hpa"
      metricsQuery: 'sum(<<.Series>>{<<.LabelMatchers>>}) by (<<.GroupBy>>)'