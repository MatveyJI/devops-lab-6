replicas: 1

adminUser: admin
adminPassword: admin12345

persistence:
  enabled: true
  size: 5Gi

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

grafana.ini:
  server:
    domain: grafana.127.0.0.1.nip.io
    root_url: http://grafana.127.0.0.1.nip.io/
    serve_from_sub_path: false
  security:
    cookie_secure: false
  auth.basic:
    enabled: true

ingress:
  enabled: true
  ingressClassName: nginx
  hosts:
    - grafana.127.0.0.1.nip.io
  path: /
  pathType: Prefix

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi
